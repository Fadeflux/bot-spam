<!DOCTYPE html>
<html>
<head>
    <title>Test OAuth</title>
</head>
<body>
    <h1>Test d'authentification OAuth</h1>
    
    <button onclick="startOAuth()">Démarrer OAuth</button>
    
    <div id="result"></div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function startOAuth() {
            console.log('Envoi de la requête OAuth...');
            try {
                const response = await fetch(`${API_URL}/oauth/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account_number: 1 })
                });
                
                console.log('Status:', response.status);
                const data = await response.json();
                console.log('Data:', data);
                
                if (data.success) {
                    document.getElementById('result').innerHTML = `
                        <h2>Succès!</h2>
                        <p>Session ID: ${data.session_id}</p>
                        <p>URL OAuth: <a href="${data.auth_url}" target="_blank">${data.auth_url}</a></p>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `<h2>Erreur: ${data.error}</h2>`;
                }
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('result').innerHTML = `<h2>Erreur réseau: ${error.message}</h2>`;
            }
        }
    </script>
</body>
</html>
